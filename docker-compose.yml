# Quorum stack — run with: podman compose up -d --build
#
# Only the web app runs here. It talks to services that already run on/near
# your host:
#   - OBS Studio          (host)     via OBS WebSocket   -> host.containers.internal:4455
#   - Ollama (the LLM)     (host)     via HTTP API        -> host.containers.internal:11434
#   - Whisper STT          (external) via OpenAI-compatible API -> STT_BASE_URL
#
# OBS runs on the HOST (not a container) so it can capture your real screen
# and audio.

services:
  app:
    build: ./app
    container_name: quorum
    restart: unless-stopped
    ports:
      - "7080:8080"
    environment:
      OBS_HOST: "${OBS_HOST:-host.containers.internal}"
      OBS_PORT: "${OBS_PORT:-4455}"
      OBS_PASSWORD: "${OBS_PASSWORD:-}"
      STT_BASE_URL: "${STT_BASE_URL:-http://whisper:9000/v1}"
      STT_MODEL: "${STT_MODEL:-whisper-1}"
      STT_API_KEY: "${STT_API_KEY:-}"
      OLLAMA_URL: "${OLLAMA_URL:-http://host.containers.internal:11434}"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-gemma4:12b}"
      DATA_DIR: "/data"
      # Host path of the /data mount, so the app can translate the file
      # paths OBS reports (which are host paths) into container paths.
      HOST_DATA_DIR: "${HOME}/MeetingMinutes"
      # TLS (optional): blank = plain HTTP. Run ./gen-cert.sh to create ./certs,
      # then the app auto-serves HTTPS on the same port. These let you override
      # the cert paths if you mount them elsewhere.
      SSL_CERTFILE: "${SSL_CERTFILE:-}"
      SSL_KEYFILE: "${SSL_KEYFILE:-}"
    volumes:
      - "${HOME}/MeetingMinutes:/data:z"
      # Certs generated by ./gen-cert.sh; read-only inside the container.
      - "./certs:/certs:ro,z"
    extra_hosts:
      - "host.containers.internal:host-gateway"
      # The STT server's .singhs name isn't resolvable inside the container,
      # so pin it here. Update the IP if the box's address changes (or just
      # put the IP directly in STT_BASE_URL).
      - "linux-al-ml-beast.singhs:192.168.1.44"
